<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEN 視覺配對王</title>
    <style>
        /* 基礎樣式保持不變，加入 Start Overlay */
        :root { --bg: #000; --active: #fff; --win: #27ae60; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .start-btn { 
            padding: 30px 60px; font-size: 40px; cursor: pointer; 
            background: #2980b9; color: white; border: none; border-radius: 20px;
        }

        #app { display: flex; flex-direction: column; height: 100vh; filter: blur(0px); transition: 0.3s; }
        .controls { background: #222; padding: 15px; display: flex; gap: 20px; align-items: center; border-bottom: 3px solid #444; }
        .top-half { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bottom-half { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        
        .target-slot { width: 220px; height: 220px; border: 8px solid #444; border-radius: 30px; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .shape-btn { width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; border-radius: 20px; background: #1a1a1a; transition: 0.2s; }
        .highlight { outline: 10px solid var(--active); outline-offset: 5px; transform: scale(1.1); background: #333; }
        
        .gaze-bar-container { position: absolute; bottom: -20px; left: 0; width: 100%; height: 10px; background: #333; }
        .gaze-bar { height: 100%; background: white; width: 0%; }
        svg { width: 70%; height: 70%; }
        .win-flash { background-color: #06331a !important; }
    </style>
</head>
<body>

<div id="start-screen">
    <button class="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<div id="app">
    <div class="controls">
        <button id="toggleMode" style="font-size:18px;">切換模式</button>
        <button onclick="location.reload()" style="font-size:18px;">重新開始</button>
    </div>
    <div class="top-half">
        <div id="prompt" style="font-size:24px; margin-bottom:10px;">請找出：</div>
        <div class="target-slot" id="targetSlot"></div>
    </div>
    <div class="bottom-half" id="optionsContainer">
        </div>
</div>

<script>
    const shapeData = [
        { id: 'star', name: '星型', html: `<svg viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 67,57 78,91 50,70 22,91 33,57 5,35 39,35" fill="yellow"/></svg>` },
        { id: 'circle', name: '圓形', html: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="blue"/></svg>` },
        { id: 'triangle', name: '三角形', html: `<svg viewBox="0 0 100 100"><polygon points="50,15 90,85 10,85" fill="red"/></svg>` },
        { id: 'square', name: '正方形', html: `<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" fill="green"/></svg>` }
    ];

    let currentTarget = null;
    let isScanMode = false;
    let scanIdx = -1;
    let scanTimer = null;

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        window.speechSynthesis.speak(utter);
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        initRound();
    }

    function initRound() {
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        
        // 隨機排列選項 (Shuffle)
        const shuffled = [...shapeData].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(shape => {
            const div = document.createElement('div');
            div.className = 'shape-btn';
            div.id = shape.id;
            div.innerHTML = shape.html + `<div class="gaze-bar-container"><div class="gaze-bar"></div></div>`;
            div.onclick = () => !isScanMode && checkMatch(shape.id);
            container.appendChild(div);
        });

        // 隨機選定目標
        currentTarget = shapeData[Math.floor(Math.random() * 4)];
        document.getElementById('targetSlot').innerHTML = currentTarget.html;
        
        setTimeout(() => speak(`請搵出${currentTarget.name}`), 500);
        if(isScanMode) startScanning();
    }

    function checkMatch(id) {
        if(id === currentTarget.id) {
            document.body.classList.add('win-flash');
            speak("答對了！");
            setTimeout(() => {
                document.body.classList.remove('win-flash');
                initRound();
            }, 2000);
        } else {
            speak("唔啱，再試下");
        }
    }

    // 掃描邏輯優化... (與前述類似但加入動態 DOM 支援)
    function startScanning() {
        clearInterval(scanTimer);
        scanIdx = -1;
        const btns = document.getElementsByClassName('shape-btn');
        scanTimer = setInterval(() => {
            scanIdx = (scanIdx + 1) % btns.length;
            Array.from(btns).forEach(b => b.classList.remove('highlight'));
            btns[scanIdx].classList.add('highlight');
        }, 2000);
    }

    document.getElementById('toggleMode').onclick = () => {
        isScanMode = !isScanMode;
        if(isScanMode) startScanning(); else clearInterval(scanTimer);
    };
</script>
</body>
</html>
