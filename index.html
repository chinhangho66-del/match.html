<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEN 視覺配對王 - 強化拖拉版</title>
    <style>
        :root { --bg: #000; --active: #2980b9; --success: #27ae60; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .big-btn { padding: 30px 60px; font-size: 40px; cursor: pointer; background: var(--active); color: white; border: none; border-radius: 20px; }

        #app { display: flex; flex-direction: column; height: 100vh; visibility: hidden; }
        .nav { background: #222; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid #444; z-index: 100; }
        .nav button { padding: 8px 15px; font-size: 16px; cursor: pointer; border-radius: 8px; border: 1px solid #555; background: #333; color: white; }
        .nav button.active { background: var(--active); border-color: white; }

        .target-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 4px dashed #333; }
        .target-box { width: 180px; height: 180px; border: 8px solid #444; border-radius: 30px; display: flex; justify-content: center; align-items: center; }
        .target-box.hover { background: #222; border-color: #666; transform: scale(1.05); }

        .options-area { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; position: relative; }
        .shape-card { width: 140px; height: 140px; background: #1a1a1a; border-radius: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .shape-card svg { width: 70%; height: 70%; pointer-events: none; }
        .shape-card.dragging-origin { opacity: 0.3; }
        .highlight { outline: 8px solid white; transform: scale(1.1); }

        /* 跟隨手指的幻影圖形 */
        #drag-proxy {
            position: fixed; pointer-events: none; z-index: 1000; display: none;
            width: 140px; height: 140px; opacity: 0.8; transform: translate(-50%, -50%);
        }

        .correct-anim { transform: scale(1.3); border-color: var(--success) !important; }
        .win-flash { background-color: #06331a !important; }
    </style>
</head>
<body>

<div id="overlay"><button class="big-btn" onclick="initStart()">開始遊戲</button></div>
<div id="drag-proxy"></div>

<div id="app">
    <div class="nav">
        <button onclick="setMode('click')" id="btn-click">點擊模式</button>
        <button onclick="setMode('drag')" id="btn-drag">拖拉模式</button>
        <button onclick="setMode('scan')" id="btn-scan">掃描模式</button>
    </div>
    <div class="target-area" id="dropZone">
        <div style="margin-bottom:10px; color:#aaa;">目標圖形：</div>
        <div class="target-box" id="targetBox"></div>
    </div>
    <div class="options-area" id="optionsGrid"></div>
</div>

<script>
    const shapes = [
        { id: 'star', name: '星型', svg: '<svg viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 67,57 78,91 50,70 22,91 33,57 5,35 39,35" fill="yellow"/></svg>' },
        { id: 'circle', name: '圓形', svg: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="blue"/></svg>' },
        { id: 'triangle', name: '三角形', svg: '<svg viewBox="0 0 100 100"><polygon points="50,15 90,85 10,85" fill="red"/></svg>' },
        { id: 'square', name: '正方形', svg: '<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" fill="green"/></svg>' }
    ];

    let currentTarget = null;
    let gameMode = 'click';
    let isLocked = false;
    let scanIdx = -1, scanTimer = null;
    let dragData = null;

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        window.speechSynthesis.speak(utter);
    }

    function initStart() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('app').style.visibility = 'visible';
        setMode('click');
        newRound();
    }

    function setMode(mode) {
        gameMode = mode;
        clearInterval(scanTimer);
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        if(mode === 'scan') startScanning();
    }

    function newRound() {
        isLocked = false;
        document.body.classList.remove('win-flash');
        document.getElementById('targetBox').classList.remove('correct-anim');
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        
        [...shapes].sort(() => Math.random() - 0.5).forEach(s => {
            const card = document.createElement('div');
            card.className = 'shape-card';
            card.id = s.id;
            card.innerHTML = s.svg;
            
            // 綁定點擊 (Click Mode)
            card.onmousedown = card.ontouchstart = (e) => {
                if(isLocked) return;
                if(gameMode === 'click') checkMatch(s.id);
                if(gameMode === 'drag') startCustomDrag(e, s);
            };
            grid.appendChild(card);
        });

        currentTarget = shapes[Math.floor(Math.random() * shapes.length)];
        document.getElementById('targetBox').innerHTML = currentTarget.svg;
        speak(`請找出${currentTarget.name}`);
    }

    // --- 自定義拖拉邏輯 (兼容 PC & Mobile) ---
    function startCustomDrag(e, shape) {
        dragData = shape.id;
        const proxy = document.getElementById('drag-proxy');
        const originCard = document.getElementById(shape.id);
        
        proxy.innerHTML = shape.svg;
        proxy.style.display = 'block';
        originCard.classList.add('dragging-origin');

        const moveAt = (pageX, pageY) => {
            proxy.style.left = pageX + 'px';
            proxy.style.top = pageY + 'px';
            
            // 偵測是否進入目標區
            const dropRect = document.getElementById('dropZone').getBoundingClientRect();
            if(pageX > dropRect.left && pageX < dropRect.right && pageY > dropRect.top && pageY < dropRect.bottom) {
                document.getElementById('targetBox').classList.add('hover');
            } else {
                document.getElementById('targetBox').classList.remove('hover');
            }
        };

        const onMove = (event) => {
            const pos = event.touches ? event.touches[0] : event;
            moveAt(pos.clientX, pos.clientY);
        };

        const onEnd = (event) => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
            
            proxy.style.display = 'none';
            originCard.classList.remove('dragging-origin');
            document.getElementById('targetBox').classList.remove('hover');

            // 判斷放手位置
            const pos = event.changedTouches ? event.changedTouches[0] : event;
            const dropRect = document.getElementById('dropZone').getBoundingClientRect();
            if(pos.clientX > dropRect.left && pos.clientX < dropRect.right && 
               pos.clientY > dropRect.top && pos.clientY < dropRect.bottom) {
                checkMatch(dragData);
            }
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
        
        const initPos = e.touches ? e.touches[0] : e;
        moveAt(initPos.clientX, initPos.clientY);
    }

    function checkMatch(id) {
        if(isLocked) return;
        isLocked = true;
        if(id === currentTarget.id) {
            document.body.classList.add('win-flash');
            document.getElementById('targetBox').classList.add('correct-anim');
            speak("答對了，好叻呀！");
            setTimeout(newRound, 2000);
        } else {
            speak("唔啱喎，再試下");
            setTimeout(() => { 
                isLocked = false; 
                if(gameMode === 'scan') startScanning();
            }, 1200);
        }
    }

    function startScanning() {
        clearInterval(scanTimer);
        const cards = document.querySelectorAll('.shape-card');
        scanIdx = -1;
        scanTimer = setInterval(() => {
            if(isLocked) return;
            scanIdx = (scanIdx + 1) % cards.length;
            cards.forEach(c => c.classList.remove('highlight'));
            cards[scanIdx].classList.add('highlight');
        }, 2000);
    }

    window.onkeydown = (e) => {
        if(e.code === 'Space' && gameMode === 'scan' && !isLocked) {
            const cards = document.querySelectorAll('.shape-card');
            if(scanIdx !== -1) checkMatch(cards[scanIdx].id);
        }
    };
</script>
</body>
</html>
